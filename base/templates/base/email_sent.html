<!DOCTYPE html>
{% load static %}
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message envoyé — Mohamed Salmi</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0a192f;
      color: #8892b0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #112240;
      border: 1px solid rgba(100,255,218,.2);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .icon { font-size: 3.5rem; color: #64ffda; margin-bottom: 1.5rem; }
    h1 { color: #ccd6f6; font-size: 1.8rem; font-weight: 700; margin-bottom: 1rem; }
    p { font-size: 1rem; line-height: 1.8; margin-bottom: 2rem; }
    .btn-back {
      display: inline-block;
      background: #64ffda;
      color: #0a192f;
      font-weight: 700;
      padding: .75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity .25s;
    }
    .btn-back:hover { opacity: .85; color: #0a192f; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon"><i class="fas fa-check-circle"></i></div>
    <h1>Message envoyé !</h1>
    <p>Merci de m'avoir contacté. Votre message a bien été reçu. Je vous répondrai dans les meilleurs délais, généralement sous 24h.</p>
    <a href="{% url 'home' %}" class="btn-back"><i class="fas fa-arrow-left me-2"></i>Retour à l'accueil</a>
  </div>
</body>
</html>
